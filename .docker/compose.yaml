services:
  api:
    build:
      context: ..
      dockerfile: .docker/Dockerfile
    env_file:
      - path: ${ENV_FILE:-../config/env/development.env}
        required: true
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/live')"]
      interval: 10s
      timeout: 3s
      retries: 5

  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB in the Compose env file}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER in the Compose env file}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in the Compose env file}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app"]
      interval: 5s
      timeout: 3s
      retries: 10

  test-db:
    image: postgres:18-alpine
    profiles: ["test"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB in the Compose env file}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER in the Compose env file}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in the Compose env file}
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app_test"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
