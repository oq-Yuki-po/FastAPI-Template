name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8
        with:
          version: "0.11.29"
          enable-cache: true
      - run: uv sync --locked
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy app
      - run: uv run bandit -q -r app
      - run: uv export --locked --no-dev --format requirements-txt --output-file /tmp/requirements.txt
      - run: uv run pip-audit --disable-pip --requirement /tmp/requirements.txt
      - run: uv run pytest

  postgres-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: app_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d app_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/app_test
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/app_test
      SECRET_KEY: ci-only-secret-key-with-at-least-32-characters
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8
        with:
          version: "0.11.29"
          enable-cache: true
      - run: uv sync --locked
      - run: uv run alembic upgrade head
      - run: uv run pytest

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: .docker/Dockerfile
          push: false
          tags: fastapi-template:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
